# Build a PIR snapshot at a given block height and publish it to DO Spaces
# under s3://vote/snapshots/<height>/ for download by nf-server replicas
# and the admin UI. Runs on PIR_BACKUP_HOST so the primary stays focused
# on serving; backup keeps serving its current snapshot throughout.
#
# Pure publish operation: writes tier blobs under /tmp on the host, reads
# nullifiers from the live /opt/nf-ingest/pir-data/ tree (never mutates it),
# never restarts the service.
#
# Requires repository secrets:
#   PIR_BACKUP_HOST, DEPLOY_USER, SSH_KEY,
#   DO_ACCESS_KEY, DO_SECRET_KEY.

name: Publish nullifier snapshot

on:
  workflow_dispatch:
    inputs:
      height:
        description: "Target block height (rounded down to nearest multiple of 10). If empty, uses the latest chain tip."
        required: false
        type: string
      include_nullifier_artifacts:
        description: "If true, also upload nullifiers.bin, nullifiers.checkpoint, and nullifiers.tree under snapshots/<height>/ (large). Default false keeps uploads tier-only."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/nf-ingest
  DO_BUCKET: vote
  DO_PREFIX: snapshots
  DO_PUBLIC_BASE: https://vote.fra1.digitaloceanspaces.com/snapshots

jobs:
  publish:
    name: Build and upload snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Round explicit height (if provided)
        id: round_height
        run: |
          set -euo pipefail
          RAW="${{ github.event.inputs.height }}"
          if [ -n "$RAW" ]; then
            H=$(( (RAW / 10) * 10 ))
            echo "value=$H" >> "$GITHUB_OUTPUT"
            echo "Target height (explicit): $H"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
            echo "Target height: latest chain tip (resolved on backup host)"
          fi

      - name: Build snapshot, upload to DO Spaces, verify
        uses: appleboy/ssh-action@v1.0.3
        env:
          DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
          DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
        with:
          host: ${{ secrets.PIR_BACKUP_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: DO_ACCESS_KEY,DO_SECRET_KEY
          command_timeout: 90m
          script: |
            set -euo pipefail

            REQUESTED_H="${{ steps.round_height.outputs.value }}"
            BUCKET="${{ env.DO_BUCKET }}"
            PREFIX="${{ env.DO_PREFIX }}"
            PUBLIC_BASE="${{ env.DO_PUBLIC_BASE }}"
            PRECOMPUTE_TARGET="linux-amd64-avx512"
            STAGE_PARENT="${{ env.DEPLOY_PATH }}/snapshot-staging"
            STAGE=""

            echo "==> Ensuring s3cmd and jq are installed"
            if ! command -v s3cmd >/dev/null 2>&1 || ! command -v jq >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y -qq s3cmd jq
            fi

            echo "==> Writing s3cmd config"
            S3CFG="$(mktemp)"
            trap 'rm -f "$S3CFG"; rm -rf "$STAGE"' EXIT
            cat > "$S3CFG" <<EOF
            [default]
            access_key = $DO_ACCESS_KEY
            secret_key = $DO_SECRET_KEY
            host_base = fra1.digitaloceanspaces.com
            host_bucket = %(bucket)s.fra1.digitaloceanspaces.com
            bucket_location = fra1
            use_https = True
            EOF

            echo "==> Sync nullifiers + tree checkpoint + PIR tiers (staging)"
            cd "${{ env.DEPLOY_PATH }}"
            export SVOTE_PIR_VOTING_CONFIG_URL=
            mkdir -p "$STAGE_PARENT"
            find "$STAGE_PARENT" -maxdepth 1 -type d -name 'snap-build.*' -mtime +1 -exec rm -rf {} +
            STAGE="$(mktemp -d "$STAGE_PARENT/snap-build.XXXXXX")"
            if [ -n "$REQUESTED_H" ]; then
              echo "    up to explicit height $REQUESTED_H"
              ./nf-server sync \
                --pir-data-dir "${{ env.DEPLOY_PATH }}/pir-data" \
                --output-dir "$STAGE" \
                --lwd-url https://zec.rocks:443 \
                --non-interactive \
                --invalidate-after-blocks \
                --max-height "$REQUESTED_H"
            else
              echo "    to latest chain tip"
              ./nf-server sync \
                --pir-data-dir "${{ env.DEPLOY_PATH }}/pir-data" \
                --output-dir "$STAGE" \
                --lwd-url https://zec.rocks:443 \
                --non-interactive \
                --invalidate-after-blocks
            fi

            echo "==> Read height from exported pir_root.json"
            H=$(jq -r '.height // empty' "$STAGE/pir_root.json")
            if [ -z "$H" ]; then
              echo "ERROR: pir_root.json is missing the height field"
              exit 1
            fi
            echo "    Exported height: $H"

            if [ -n "$REQUESTED_H" ] && [ "$H" -gt "$REQUESTED_H" ]; then
              echo "ERROR: exported height ($H) exceeds requested ($REQUESTED_H)"
              exit 1
            fi

            echo "==> Generate production precompute caches (required)"
            ./nf-server precompute-cache --pir-data-dir "$STAGE"

            echo "==> Building manifest.json"
            BIN_SHA=$(sha256sum "${{ env.DEPLOY_PATH }}/nf-server" | awk '{print $1}')
            CREATED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            TIER_JSON=$(
              cd "$STAGE"
              for f in tier0.bin tier1.bin tier2.bin pir_root.json; do
                size=$(stat -c%s "$f")
                sha=$(sha256sum "$f" | awk '{print $1}')
                jq -n --arg name "$f" --argjson size "$size" --arg sha "$sha" \
                  '{($name): {size: $size, sha256: $sha}}'
              done | jq -s 'add'
            )
            PRECOMPUTE_JSON=$(
              cd "$STAGE"
              for f in tier1.precompute tier2.precompute; do
                size=$(stat -c%s "$f")
                sha=$(sha256sum "$f" | awk '{print $1}')
                remote="precompute/$PRECOMPUTE_TARGET/$f"
                jq -n --arg name "$remote" --argjson size "$size" --arg sha "$sha" \
                  '{($name): {size: $size, sha256: $sha}}'
              done | jq -s 'add'
            )
            NF_JSON='{}'
            if [ "${{ inputs.include_nullifier_artifacts }}" = "true" ]; then
              echo "    include_nullifier_artifacts=true (adding on-chain + tree blobs to manifest)"
              NF_DIR="${{ env.DEPLOY_PATH }}/pir-data"
              for f in nullifiers.bin nullifiers.checkpoint nullifiers.tree; do
                if [ ! -f "$NF_DIR/$f" ]; then
                  echo "ERROR: missing $NF_DIR/$f — run sync on this host first or disable the flag"
                  exit 1
                fi
              done
              NF_JSON=$(
                for f in nullifiers.bin nullifiers.checkpoint nullifiers.tree; do
                  size=$(stat -c%s "$NF_DIR/$f")
                  sha=$(sha256sum "$NF_DIR/$f" | awk '{print $1}')
                  jq -n --arg name "$f" --argjson size "$size" --arg sha "$sha" \
                    '{($name): {size: $size, sha256: $sha}}'
                done | jq -s 'add'
              )
            fi
            FILES_JSON=$(jq -n --argjson tier "$TIER_JSON" --argjson precompute "$PRECOMPUTE_JSON" --argjson nf "$NF_JSON" '$tier + $precompute + $nf')
            jq -n \
              --argjson height "$H" \
              --arg created_at "$CREATED_AT" \
              --arg nf_server_sha256 "$BIN_SHA" \
              --arg git_ref "${{ github.ref_name }}" \
              --arg git_sha "${{ github.sha }}" \
              --argjson files "$FILES_JSON" \
              '{
                schema_version: 1,
                height: $height,
                created_at: $created_at,
                nf_server_sha256: $nf_server_sha256,
                publisher: { git_ref: $git_ref, git_sha: $git_sha },
                files: $files
              }' > "$STAGE/manifest.json"
            cat "$STAGE/manifest.json"

            echo "==> Upload data files to s3://$BUCKET/$PREFIX/$H/ (manifest last)"
            for f in tier0.bin tier1.bin tier2.bin pir_root.json; do
              echo "  - $f"
              s3cmd -c "$S3CFG" put "$STAGE/$f" "s3://$BUCKET/$PREFIX/$H/$f" \
                --acl-public --force --no-progress
            done
            for f in tier1.precompute tier2.precompute; do
              remote="precompute/$PRECOMPUTE_TARGET/$f"
              echo "  - $remote"
              s3cmd -c "$S3CFG" put "$STAGE/$f" "s3://$BUCKET/$PREFIX/$H/$remote" \
                --acl-public --force --no-progress
            done
            if [ "${{ inputs.include_nullifier_artifacts }}" = "true" ]; then
              NF_DIR="${{ env.DEPLOY_PATH }}/pir-data"
              for f in nullifiers.bin nullifiers.checkpoint nullifiers.tree; do
                echo "  - $f (nullifier / tree bundle)"
                s3cmd -c "$S3CFG" put "$NF_DIR/$f" "s3://$BUCKET/$PREFIX/$H/$f" \
                  --acl-public --force --no-progress
              done
            fi
            echo "  - manifest.json (last, so partial uploads stay invisible)"
            s3cmd -c "$S3CFG" put "$STAGE/manifest.json" "s3://$BUCKET/$PREFIX/$H/manifest.json" \
              --acl-public --force --no-progress \
              --add-header="Cache-Control:no-cache, max-age=0"

            echo "==> Enforce public-read ACL on all uploaded files"
            ACL_FILES="tier0.bin tier1.bin tier2.bin pir_root.json"
            for f in tier1.precompute tier2.precompute; do
              ACL_FILES="$ACL_FILES precompute/$PRECOMPUTE_TARGET/$f"
            done
            if [ "${{ inputs.include_nullifier_artifacts }}" = "true" ]; then
              ACL_FILES="$ACL_FILES nullifiers.bin nullifiers.checkpoint nullifiers.tree"
            fi
            for f in $ACL_FILES manifest.json; do
              s3cmd -c "$S3CFG" setacl --acl-public "s3://$BUCKET/$PREFIX/$H/$f"
            done

            echo "==> Verify round-trip: download manifest + tier0 over HTTPS, re-check sha256"
            VERIFY_DIR=$(mktemp -d)
            trap 'rm -f "$S3CFG"; rm -rf "$STAGE" "$VERIFY_DIR"' EXIT
            curl -fsSL "$PUBLIC_BASE/$H/manifest.json" -o "$VERIFY_DIR/manifest.json"
            REMOTE_HEIGHT=$(jq -r '.height' "$VERIFY_DIR/manifest.json")
            REMOTE_TIER0_SHA=$(jq -r '.files["tier0.bin"].sha256' "$VERIFY_DIR/manifest.json")
            if [ "$REMOTE_HEIGHT" != "$H" ]; then
              echo "ERROR: remote manifest height ($REMOTE_HEIGHT) != $H"
              exit 1
            fi
            curl -fsSL "$PUBLIC_BASE/$H/tier0.bin" -o "$VERIFY_DIR/tier0.bin"
            ACTUAL_TIER0_SHA=$(sha256sum "$VERIFY_DIR/tier0.bin" | awk '{print $1}')
            if [ "$ACTUAL_TIER0_SHA" != "$REMOTE_TIER0_SHA" ]; then
              echo "ERROR: downloaded tier0.bin sha256 mismatch"
              echo "  expected: $REMOTE_TIER0_SHA"
              echo "  actual:   $ACTUAL_TIER0_SHA"
              exit 1
            fi
            echo "==> Verify precompute entries: local disk matches published manifest (no multi-GB re-download)"
            for f in tier1.precompute tier2.precompute; do
              remote="precompute/$PRECOMPUTE_TARGET/$f"
              EXPECT=$(jq -r --arg n "$remote" '.files[$n].sha256 // empty' "$VERIFY_DIR/manifest.json")
              if [ -z "$EXPECT" ]; then
                echo "ERROR: manifest missing files[$remote] after upload"
                exit 1
              fi
              ACTUAL=$(sha256sum "$STAGE/$f" | awk '{print $1}')
              if [ "$EXPECT" != "$ACTUAL" ]; then
                echo "ERROR: local $f sha256 does not match manifest (upload integrity)"
                echo "  manifest: $EXPECT"
                echo "  local:    $ACTUAL"
                exit 1
              fi
            done
            if [ "${{ inputs.include_nullifier_artifacts }}" = "true" ]; then
              NF_DIR="${{ env.DEPLOY_PATH }}/pir-data"
              echo "==> Verify nullifier/tree entries: local disk matches published manifest (no multi-GB re-download)"
              for f in nullifiers.bin nullifiers.checkpoint nullifiers.tree; do
                EXPECT=$(jq -r --arg n "$f" '.files[$n].sha256 // empty' "$VERIFY_DIR/manifest.json")
                if [ -z "$EXPECT" ]; then
                  echo "ERROR: manifest missing files[$f] after upload"
                  exit 1
                fi
                ACTUAL=$(sha256sum "$NF_DIR/$f" | awk '{print $1}')
                if [ "$EXPECT" != "$ACTUAL" ]; then
                  echo "ERROR: local $f sha256 does not match manifest (upload integrity)"
                  echo "  manifest: $EXPECT"
                  echo "  local:    $ACTUAL"
                  exit 1
                fi
              done
            fi
            echo "==> Snapshot $H published and verified at $PUBLIC_BASE/$H/"

  notify-slack:
    name: Slack Notification
    if: ${{ always() && needs.publish.result == 'failure' }}
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PIR Snapshot Publish failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "PIR Snapshot Publish Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Publish nullifier snapshot>" },
                    { "type": "mrkdwn", "text": "*Height:*\n`${{ github.event.inputs.height || 'latest' }}`" },
                    { "type": "mrkdwn", "text": "*Include nullifier artifacts:*\n`${{ inputs.include_nullifier_artifacts }}`" }
                  ]
                }
              ]
            }

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: nf-server doctor (smoke)
        run: cargo run -p nf-server -- doctor

      - name: Run unit tests
        run: |
          cargo test --lib -p imt-tree
          cargo test --lib -p nf-ingest
          cargo test -p pir-server
          cargo test -p pir-server --features rayon
          # nf-server is a binary crate; run its unit tests + the
          # bootstrap_e2e integration suite under the `serve` feature
          # (the only build configuration in which the bootstrap and
          # /metrics modules are compiled in).
          cargo test -p nf-server --features serve

  notify-slack:
    name: Slack Notification
    if: ${{ always() && github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.test.result == 'failure' }}
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PIR Tests failed on main",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "PIR Tests Failed on main" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Tests>" },
                    { "type": "mrkdwn", "text": "*Branch:*\nmain" },
                    { "type": "mrkdwn", "text": "*Commit:*\n<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|`${{ github.sha }}`>" },
                    { "type": "mrkdwn", "text": "*Author:*\n${{ github.actor }}" }
                  ]
                }
              ]
            }

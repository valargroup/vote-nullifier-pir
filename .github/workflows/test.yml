name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-test-

      - name: Run unit tests
        run: |
          cargo test --lib -p imt-tree
          cargo test --lib -p nf-ingest
          # nf-server is a binary crate; run its unit tests + the
          # bootstrap_e2e integration suite under the `serve` feature
          # (the only build configuration in which the bootstrap and
          # /metrics modules are compiled in).
          cargo test -p nf-server --features serve

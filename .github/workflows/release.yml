# Build nf-server for all platforms and publish a GitHub Release on version tags.
#
# Release assets:
#   nf-server-linux-amd64, nf-server-linux-arm64,
#   nf-server-darwin-amd64, nf-server-darwin-arm64,
#   nullifier-query-server.service, SHA256SUMS
# DO Spaces: start_pir.sh (latest + scripts/start_pir/<snapshot_height>/)
#   + SHA256SUMS-<tag> (same contents as GitHub Releases SHA256SUMS)
#
# The zally (Shielded-Vote) release workflow fetches these binaries via
# `gh release download` when assembling its own release tarballs.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build nf-server (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            platform: linux-arm64
          - os: macos-latest
            platform: darwin-arm64
          # Native x86_64 Apple build (not cross from arm64) so YPIR's C++
          # toolchain matches the host and we can ship `serve,rayon` like
          # other release artifacts. `macos-15-intel` is GitHub's current
          # Intel runner label (macos-13 was retired).
          - os: macos-15-intel
            platform: darwin-amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            target
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.platform }}-nf-server-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.platform }}-nf-server-

      - name: Build release binary
        run: |
          if [ "${{ matrix.platform }}" = "linux-amd64" ]; then
            # Production fleet target: AVX-512 kernel + Rayon (`pir-server/rayon`
            # + nested kernel parallelism). `rayon` feature implies `serve`.
            CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS="-C target-cpu=x86-64-v4" \
              cargo build --release \
              --manifest-path nf-server/Cargo.toml --features avx512,rayon \
              --target x86_64-unknown-linux-gnu
            mkdir -p target/release
            cp target/x86_64-unknown-linux-gnu/release/nf-server target/release/
          else
            # linux-arm64, darwin-arm64, darwin-amd64 (macos-15-intel): full
            # `serve` binary with `pir-server/rayon` for PIR + Phase 1.1 batch.
            cargo build --release --manifest-path nf-server/Cargo.toml \
              --features serve,rayon
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nf-server-${{ matrix.platform }}
          path: target/release/nf-server

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nf-server-*

      - name: Prepare release assets
        run: |
          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            cp "nf-server-${PLATFORM}/nf-server" "nf-server-${PLATFORM}.tmp"
            rm -rf "nf-server-${PLATFORM}"
            mv "nf-server-${PLATFORM}.tmp" "nf-server-${PLATFORM}"
            chmod +x "nf-server-${PLATFORM}"
          done
          cp docs/nullifier-query-server.service .

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          sha256sum \
            nf-server-linux-amd64 \
            nf-server-linux-arm64 \
            nf-server-darwin-amd64 \
            nf-server-darwin-arm64 \
            nullifier-query-server.service \
            > SHA256SUMS

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nf-server-linux-amd64
            nf-server-linux-arm64
            nf-server-darwin-amd64
            nf-server-darwin-arm64
            nullifier-query-server.service
            SHA256SUMS

  distribute:
    name: Distribute to DigitalOcean Spaces
    runs-on: ubuntu-latest
    needs: release
    env:
      DO_ACCESS_KEY: ${{ secrets.DO_ACCESS_KEY }}
      DO_SECRET_KEY: ${{ secrets.DO_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nf-server-*

      - name: Prepare binaries and SHA256SUMS for Spaces
        run: |
          set -euo pipefail
          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            cp "nf-server-${PLATFORM}/nf-server" "nf-server-${PLATFORM}.tmp"
            rm -rf "nf-server-${PLATFORM}"
            mv "nf-server-${PLATFORM}.tmp" "nf-server-${PLATFORM}"
            chmod +x "nf-server-${PLATFORM}"
          done
          cp docs/nullifier-query-server.service .
          sha256sum \
            nf-server-linux-amd64 \
            nf-server-linux-arm64 \
            nf-server-darwin-amd64 \
            nf-server-darwin-arm64 \
            nullifier-query-server.service \
            > SHA256SUMS

      - name: Render start_pir.sh installer
        run: |
          set -euo pipefail
          # Keep sed substitutions aligned with start-pir-installer-smoke.yml.
          sed \
            -e "s|__RELEASE_TAG__|${GITHUB_REF_NAME}|g" \
            -e "s|__GITHUB_REPO__|${GITHUB_REPOSITORY}|g" \
            -e "s|__BINARY_BASE_URL__|https://vote.fra1.digitaloceanspaces.com/binaries/vote-pir|g" \
            -e "s|__VOTING_CONFIG_URL__|https://valargroup.github.io/token-holder-voting-config/voting-config.json|g" \
            -e "s|__PRECOMPUTED_BASE_URL__|https://vote.fra1.digitaloceanspaces.com|g" \
            scripts/start_pir.sh.template > start_pir.sh
          chmod +x start_pir.sh

      - name: Upload to DigitalOcean Spaces
        if: ${{ env.DO_ACCESS_KEY != '' && env.DO_SECRET_KEY != '' }}
        continue-on-error: true
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          pip install --quiet s3cmd
          cat > /tmp/do-spaces.s3cfg <<EOF
          [default]
          access_key = ${DO_ACCESS_KEY}
          secret_key = ${DO_SECRET_KEY}
          host_base = fra1.digitaloceanspaces.com
          host_bucket = %(bucket)s.fra1.digitaloceanspaces.com
          bucket_location = fra1
          use_https = True
          EOF
          for PLATFORM in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            BINARY="nf-server-${PLATFORM}"
            if [ -f "$BINARY" ]; then
              s3cmd -c /tmp/do-spaces.s3cfg put "$BINARY" \
                "s3://vote/binaries/vote-pir/nf-server-${VERSION}-${PLATFORM}" --acl-public --force
            fi
          done
          if [ -f SHA256SUMS ]; then
            s3cmd -c /tmp/do-spaces.s3cfg put -m text/plain --acl-public --force SHA256SUMS \
              "s3://vote/binaries/vote-pir/SHA256SUMS-${VERSION}"
          fi
          s3cmd -c /tmp/do-spaces.s3cfg put -m text/plain --acl-public --force start_pir.sh \
            s3://vote/start_pir.sh
          VOTING_CONFIG_URL="https://valargroup.github.io/token-holder-voting-config/voting-config.json"
          HEIGHT="$(
            curl -fsSL "$VOTING_CONFIG_URL" \
              | jq -e -r '.snapshot_height | tonumber | tostring'
          )"
          case "$HEIGHT" in
            '' | *[!0-9]*)
              echo "snapshot_height from voting-config must be a non-negative integer, got: ${HEIGHT:-<empty>}" >&2
              exit 1
              ;;
          esac
          s3cmd -c /tmp/do-spaces.s3cfg put -m text/plain --acl-public --force start_pir.sh \
            "s3://vote/scripts/start_pir/${HEIGHT}/start_pir.sh"

  deploy:
    name: Deploy to PIR hosts
    needs: distribute
    uses: ./.github/workflows/deploy.yml
    with:
      release_tag: ${{ github.ref_name }}
      targets: both
    secrets: inherit

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [build, release, distribute, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PIR Release failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "PIR Release Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Release>" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ github.ref_name }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nBuild: `${{ needs.build.result }}` | Release: `${{ needs.release.result }}` | Distribute: `${{ needs.distribute.result }}` | Deploy: `${{ needs.deploy.result }}`" }
                }
              ]
            }

# Run `nf-server sync` on a single deploy host, then restart the PIR service.
# Requires repository secrets: DEPLOY_HOST, DEPLOY_USER, SSH_KEY.

name: Host PIR data sync

on:
  workflow_dispatch:
    inputs:
      max_height:
        description: "Stop syncing at this block height. Non-multiples of 10 are rounded down. If not provided, defaults to the latest chain tip rounded down to the nearest multiple of 10."
        required: false
        type: string

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/nf-ingest

jobs:
  host_sync:
    name: Sync and restart
    runs-on: ubuntu-latest
    steps:
      - name: Round max_height down to nearest multiple of 10
        id: round_height
        run: |
          MAX_HEIGHT="${{ github.event.inputs.max_height }}"
          if [ -z "$MAX_HEIGHT" ]; then
            MAX_HEIGHT=$(curl -sf "https://api.blockchair.com/zcash/stats" | jq -r '.data.best_block_height')
          fi
          ROUNDED=$(( (MAX_HEIGHT / 10) * 10 ))
          echo "value=$ROUNDED" >> "$GITHUB_OUTPUT"

      - name: Sync and restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 60m
          script: |
            cd /opt/nf-ingest && \
              export SVOTE_PIR_VOTING_CONFIG_URL= && \
              ./nf-server sync \
                --pir-data-dir /opt/nf-ingest/pir-data \
                --lwd-url https://zec.rocks:443 \
                --non-interactive \
                --invalidate-after-blocks \
                --max-height ${{ steps.round_height.outputs.value }} && \
              sudo systemctl restart nullifier-query-server

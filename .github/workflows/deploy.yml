# Deploy a tagged nf-server release to PIR hosts via SSH.
# Triggered automatically after a release build, or manually via workflow_dispatch.
# Requires repository secrets: PIR_PRIMARY_HOST, PIR_BACKUP_HOST, DEPLOY_USER, SSH_KEY, NF_SENTRY_DSN.
# See docs/runbooks/ci-setup.md for one-time remote setup.
#
# Ordering: when targets=both, backup is deployed and readiness-checked first,
# then primary. Matches restart.yml so release automation does not restart
# primary while backup still runs an old binary or fails readiness.

name: Deploy nf-server

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. v0.3.0)"
        required: true
        type: string
      targets:
        description: "Which hosts to deploy to"
        required: true
        type: choice
        options:
          - both
          - primary
          - backup
        default: both
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      targets:
        required: false
        type: string
        default: both

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/nf-ingest

jobs:
  deploy_backup:
    name: Deploy ${{ inputs.release_tag }} to backup
    if: inputs.targets == 'both' || inputs.targets == 'backup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for service file)
        uses: actions/checkout@v4

      - name: Stage deploy artifacts
        run: |
          cp docs/nullifier-query-server.service .
          rm -rf nf-server/
          curl -fL --retry 5 -o nf-server \
            "https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/nf-server-linux-amd64"
          chmod +x nf-server

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PIR_BACKUP_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "nf-server,nullifier-query-server.service"
          target: ${{ env.DEPLOY_PATH }}

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PIR_BACKUP_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SENTRY_DSN
          script: |
            # systemd loads /opt/nf-ingest/.env (see nullifier-query-server.service).
            # PIR_BATCH_COMPUTE_MODE enables Phase 1.1 K=5 Rayon overlap in batch_query.
            printf '%s\n' "SENTRY_DSN=$SENTRY_DSN" "PIR_BATCH_COMPUTE_MODE=parallel-k5" \
              | sudo tee /opt/nf-ingest/.env > /dev/null
            sudo chmod 600 /opt/nf-ingest/.env
            sudo chmod +x /opt/nf-ingest/nf-server
            sudo cp /opt/nf-ingest/nullifier-query-server.service /etc/systemd/system/nullifier-query-server.service
            sudo systemctl daemon-reload
            sudo systemctl enable nullifier-query-server
            sudo systemctl restart nullifier-query-server
            echo "Deployed ${{ inputs.release_tag }} to backup"
        env:
          SENTRY_DSN: ${{ secrets.NF_SENTRY_DSN }}

      - name: Readiness check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PIR_BACKUP_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Cold-start budget: snapshot self-bootstrap (Phase 3, up to
          # ~30s for a same-region 6 GB CDN download from a DO Spaces
          # bucket) + load_serving_state which mmaps + parses ~6 GB of
          # tier files into memory (60-90s on the production droplets).
          # 10 minutes leaves extra headroom for cold hosts while still
          # failing deploys that never become query-ready.
          command_timeout: 11m
          script: |
            for i in $(seq 1 120); do
              if curl -sf http://localhost:3000/ready > /dev/null; then
                echo "Readiness check passed on backup (attempt $i)"
                exit 0
              fi
              echo "Waiting for readiness... attempt $i/120"
              sleep 5
            done
            echo "Readiness check FAILED on backup after 10m"
            sudo systemctl status nullifier-query-server --no-pager -l 2>/dev/null || true
            sudo journalctl -u nullifier-query-server --no-pager -n 50 2>/dev/null || \
              sudo grep -i nullifier /var/log/syslog 2>/dev/null | tail -30 || \
              echo "No logs available"
            exit 1

  deploy_primary:
    name: Deploy ${{ inputs.release_tag }} to primary
    needs: deploy_backup
    if: |
      always() &&
      (inputs.targets == 'both' || inputs.targets == 'primary') &&
      (needs.deploy_backup.result == 'success' || needs.deploy_backup.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for service file)
        uses: actions/checkout@v4

      - name: Stage deploy artifacts
        run: |
          cp docs/nullifier-query-server.service .
          rm -rf nf-server/
          curl -fL --retry 5 -o nf-server \
            "https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/nf-server-linux-amd64"
          chmod +x nf-server

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PIR_PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "nf-server,nullifier-query-server.service"
          target: ${{ env.DEPLOY_PATH }}

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PIR_PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SENTRY_DSN
          script: |
            printf '%s\n' "SENTRY_DSN=$SENTRY_DSN" "PIR_BATCH_COMPUTE_MODE=parallel-k5" \
              | sudo tee /opt/nf-ingest/.env > /dev/null
            sudo chmod 600 /opt/nf-ingest/.env
            sudo chmod +x /opt/nf-ingest/nf-server
            sudo cp /opt/nf-ingest/nullifier-query-server.service /etc/systemd/system/nullifier-query-server.service
            sudo systemctl daemon-reload
            sudo systemctl enable nullifier-query-server
            sudo systemctl restart nullifier-query-server
            echo "Deployed ${{ inputs.release_tag }} to primary"
        env:
          SENTRY_DSN: ${{ secrets.NF_SENTRY_DSN }}

      - name: Readiness check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PIR_PRIMARY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 11m
          script: |
            for i in $(seq 1 120); do
              if curl -sf http://localhost:3000/ready > /dev/null; then
                echo "Readiness check passed on primary (attempt $i)"
                exit 0
              fi
              echo "Waiting for readiness... attempt $i/120"
              sleep 5
            done
            echo "Readiness check FAILED on primary after 10m"
            sudo systemctl status nullifier-query-server --no-pager -l 2>/dev/null || true
            sudo journalctl -u nullifier-query-server --no-pager -n 50 2>/dev/null || \
              sudo grep -i nullifier /var/log/syslog 2>/dev/null | tail -30 || \
              echo "No logs available"
            exit 1

  notify-slack:
    name: Slack Notification
    if: ${{ always() && contains(join(needs.*.result, ','), 'failure') }}
    needs: [deploy_backup, deploy_primary]
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack on failure
        uses: slackapi/slack-github-action@v2.1.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "PIR Deploy failed",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "PIR Deploy Failed" }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Workflow:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Deploy nf-server>" },
                    { "type": "mrkdwn", "text": "*Tag:*\n`${{ inputs.release_tag }}`" },
                    { "type": "mrkdwn", "text": "*Targets:*\n`${{ inputs.targets }}`" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Job Results:*\nBackup: `${{ needs.deploy_backup.result }}` | Primary: `${{ needs.deploy_primary.result }}`" }
                }
              ]
            }

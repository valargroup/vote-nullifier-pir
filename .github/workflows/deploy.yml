# Deploy a tagged nf-server release to PIR hosts via SSH.
# Triggered automatically after a release build, or manually via workflow_dispatch.
# Requires repository secrets: PIR_PRIMARY_HOST, PIR_BACKUP_HOST, DEPLOY_USER, SSH_KEY, NF_SENTRY_DSN.
# See docs/deploy-setup.md for one-time remote setup.

name: Deploy nf-server

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to deploy (e.g. v0.3.0)"
        required: true
        type: string
      targets:
        description: "Which hosts to deploy to"
        required: true
        type: choice
        options:
          - both
          - primary
          - backup
        default: both
  workflow_call:
    inputs:
      release_tag:
        required: true
        type: string
      targets:
        required: false
        type: string
        default: both

permissions:
  contents: read

env:
  DEPLOY_PATH: /opt/nf-ingest

jobs:
  deploy:
    name: Deploy ${{ inputs.release_tag }} to ${{ matrix.host_label }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - host_label: primary
            host_secret: PIR_PRIMARY_HOST
          - host_label: backup
            host_secret: PIR_BACKUP_HOST
    steps:
      - name: Skip if not targeted
        if: inputs.targets != 'both' && inputs.targets != matrix.host_label
        run: echo "Skipping ${{ matrix.host_label }}" && exit 0

      - name: Checkout (for service file)
        if: inputs.targets == 'both' || inputs.targets == matrix.host_label
        uses: actions/checkout@v4

      - name: Stage deploy artifacts
        if: inputs.targets == 'both' || inputs.targets == matrix.host_label
        run: |
          cp docs/nullifier-query-server.service .
          rm -rf nf-server/
          curl -fL --retry 5 -o nf-server \
            "https://github.com/${{ github.repository }}/releases/download/${{ inputs.release_tag }}/nf-server-linux-amd64"
          chmod +x nf-server

      - name: Deploy via SSH
        if: inputs.targets == 'both' || inputs.targets == matrix.host_label
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "nf-server,nullifier-query-server.service"
          target: ${{ env.DEPLOY_PATH }}

      - name: Install and restart
        if: inputs.targets == 'both' || inputs.targets == matrix.host_label
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: SENTRY_DSN
          script: |
            echo "SENTRY_DSN=$SENTRY_DSN" | sudo tee /opt/nf-ingest/.env > /dev/null
            sudo chmod 600 /opt/nf-ingest/.env
            sudo chmod +x /opt/nf-ingest/nf-server
            sudo cp /opt/nf-ingest/nullifier-query-server.service /etc/systemd/system/nullifier-query-server.service
            sudo systemctl daemon-reload
            sudo systemctl enable nullifier-query-server
            sudo systemctl restart nullifier-query-server
            echo "Deployed ${{ inputs.release_tag }} to ${{ matrix.host_label }}"
        env:
          SENTRY_DSN: ${{ secrets.NF_SENTRY_DSN }}

      - name: Health check
        if: inputs.targets == 'both' || inputs.targets == matrix.host_label
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_KEY }}
          # Cold-start budget: snapshot self-bootstrap (Phase 3, up to
          # ~30s for a same-region 6 GB CDN download from a DO Spaces
          # bucket) + load_serving_state which mmaps + parses ~6 GB of
          # tier files into memory (60-90s on the production droplets).
          # 5 minutes leaves plenty of headroom for a slow link without
          # waiting forever on a real failure.
          command_timeout: 6m
          script: |
            for i in $(seq 1 60); do
              if curl -sf http://localhost:3000/health > /dev/null; then
                echo "Health check passed on ${{ matrix.host_label }} (attempt $i)"
                exit 0
              fi
              echo "Waiting for service... attempt $i/60"
              sleep 5
            done
            echo "Health check FAILED on ${{ matrix.host_label }} after 5m"
            sudo systemctl status nullifier-query-server --no-pager -l 2>/dev/null || true
            sudo journalctl -u nullifier-query-server --no-pager -n 50 2>/dev/null || \
              sudo grep -i nullifier /var/log/syslog 2>/dev/null | tail -30 || \
              echo "No logs available"
            exit 1

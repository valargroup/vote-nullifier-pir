# Manual load test against a running PIR server.
# PIR endpoint URLs are resolved from the published voting-config.json.

name: Load test PIR

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which server to target"
        type: choice
        options:
          - backup
          - primary
        default: backup
      mode:
        description: "Load shape"
        type: choice
        options:
          - single
          - batched
        default: single
      batch_size:
        description: "Proofs per load unit when mode=batched"
        type: string
        default: "5"
      concurrency:
        description: "Number of concurrent workers"
        type: string
        default: "8"
      rps:
        description: "Target requests/sec (open-loop). Leave empty for closed-loop."
        type: string
        default: ""
      duration:
        description: "Load phase duration (e.g. 60s, 5m)"
        type: string
        default: "60s"

permissions:
  contents: read

env:
  VOTING_CONFIG_URL: https://valargroup.github.io/token-holder-voting-config/voting-config.json
  SNAPSHOTS_BASE: https://vote.fra1.digitaloceanspaces.com/snapshots

jobs:
  loadtest:
    name: Load test (${{ inputs.target }}, ${{ inputs.mode }}, c=${{ inputs.concurrency }}, ${{ inputs.duration }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-targets: "true"

      - name: Build pir-test
        run: cargo build --release -p pir-test

      - name: Resolve PIR endpoint from voting-config
        run: |
          curl -fsSL --retry 3 "$VOTING_CONFIG_URL" -o voting-config.json
          if [ "${{ inputs.target }}" = "primary" ]; then
            PIR_URL=$(jq -r '.pir_endpoints[0].url' voting-config.json)
          else
            PIR_URL=$(jq -r '.pir_endpoints[1].url' voting-config.json)
          fi
          echo "PIR_URL=$PIR_URL" >> "$GITHUB_ENV"
          echo "Target: $PIR_URL"

      - name: Fetch nullifiers snapshot
        run: |
          set -euo pipefail
          HEIGHT="$(jq -r '.snapshot_height | tonumber | tostring' voting-config.json)"
          case "$HEIGHT" in
            '' | *[!0-9]*)
              echo "voting-config snapshot_height must be a non-negative integer, got: ${HEIGHT:-<empty>}" >&2
              exit 1
              ;;
          esac
          curl -fsSL --retry 3 "$SNAPSHOTS_BASE/$HEIGHT/manifest.json" -o manifest.json
          if ! jq -e '.files["nullifiers.bin"]' manifest.json >/dev/null 2>&1; then
            echo "ERROR: snapshot $HEIGHT has no nullifiers.bin in manifest."
            echo "Publish that height from 'Publish nullifier snapshot' with include_nullifier_artifacts enabled."
            exit 1
          fi
          EXPECT_SHA=$(jq -r '.files["nullifiers.bin"].sha256' manifest.json)
          EXPECT_SIZE=$(jq -r '.files["nullifiers.bin"].size' manifest.json)
          echo "Fetching $SNAPSHOTS_BASE/$HEIGHT/nullifiers.bin"
          curl -fL --retry 3 -o nullifiers.bin "$SNAPSHOTS_BASE/$HEIGHT/nullifiers.bin"
          ACTUAL_SIZE=$(wc -c < nullifiers.bin | tr -d ' ')
          if [ "$ACTUAL_SIZE" != "$EXPECT_SIZE" ]; then
            echo "ERROR: nullifiers.bin size mismatch (expected $EXPECT_SIZE, got $ACTUAL_SIZE)"
            exit 1
          fi
          ACTUAL_SHA=$(sha256sum nullifiers.bin | awk '{print $1}')
          if [ "$ACTUAL_SHA" != "$EXPECT_SHA" ]; then
            echo "ERROR: nullifiers.bin sha256 mismatch"
            echo "  expected: $EXPECT_SHA"
            echo "  actual:   $ACTUAL_SHA"
            exit 1
          fi
          echo "Fetched nullifiers.bin for height $HEIGHT (verified against manifest)"

      - name: Run load test
        run: |
          ARGS="--url $PIR_URL --nullifiers nullifiers.bin --mode ${{ inputs.mode }} --batch-size ${{ inputs.batch_size }} --concurrency ${{ inputs.concurrency }} --duration ${{ inputs.duration }} --json-out summary.json"
          if [ -n "${{ inputs.rps }}" ]; then
            ARGS="$ARGS --rps ${{ inputs.rps }}"
          fi
          ./target/release/pir-test load $ARGS

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loadtest-summary
          path: summary.json
